<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricultura Regenerativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>O que é a Agricultura regenerativa?</h1>
    
    <div class="alternativa alt-coral">
        <input type="radio" name="alt1" onclick="resposta = 'falso'"> Horta que usa agrotóxicos.<br>
    </div>

    <div class="alternativa alt-blue">
        <input type="radio" name="alt1" onclick="resposta = 'verdadeiro'"> É um modelo de produção que busca restaurar a saúde do solo sem retirar os recursos naturais dele.<br>
    </div>

    <div class="alternativa alt-yellow">
        <input type="radio" name="alt1" onclick="resposta = 'falso'"> É uma forma de produzir extraindo os minerais do solo, melhorando o ecossistema.<br>
    </div>

    <div class="alternativa alt-green">
        <input type="radio" name="alt1" onclick="resposta = 'falso'"> Show do Faustão<br>   
    </div>

    <br>
    <button onclick="verificar()">enviar</button>
    <button id="btn-dark-mode" onclick="alternarModo()">🌓 Alternar Modo</button>

    <img src="imagem-autoral.png" alt="">

    <script src="script.js"></script>
    
</body>
</html>
